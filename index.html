<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bond Stat Optimizer</title>
    <style>
        /* A little quick CSS so it isn't completely unstyled */
        body { font-family: sans-serif; padding: 20px; max-width: 600px; margin: 0 auto; }
        .alt-card { border: 1px solid #ccc; padding: 10px; margin-bottom: 10px; border-radius: 5px; }
        .controls { margin-bottom: 20px; padding: 15px; background: #f0f0f0; border-radius: 5px; }
        select, input, button { margin-top: 5px; padding: 8px; width: 100%; box-sizing: border-box;}
        button { background: #007bff; color: white; border: none; cursor: pointer; font-weight: bold; margin-top: 15px;}
        button:hover { background: #0056b3; }
    </style>
</head>
<body>

    <div style="text-align: right; margin-bottom: 10px;">
        <select id="langSelect" style="width: auto; padding: 5px;">
            <option value="kr">한국어</option>
            <option value="en">English</option>
            <option value="jp">日本語</option>
        </select>
    </div>

    <h1 data-i18n="title">인연작 스탯 최적화</h1>

    <div class="controls">
        <label data-i18n="baseChar">원본 학생:</label>
        <select id="baseCharSelect">
            <option value="" data-i18n="selectChar">-- 학생 선택 --</option>
        </select>

        <label data-i18n="targetStat">목표 스탯:</label>
        <select id="statSelect">
            <option value="atk" data-i18n="statAtk">공격력</option>
            <option value="hp" data-i18n="statHp">최대 체력</option>
            <option value="healing" data-i18n="statHeal">치유력</option>
        </select>
    </div>

    <div id="altsContainer"></div>

    <button id="calcButton" style="display:none;" data-i18n="calcBtn">최적화 계획 산출</button>

    <div id="results" style="margin-top: 20px;"></div>

    <script src="app.js"></script>
</body>
</html>
